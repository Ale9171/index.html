    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand-red: #E01E37; --bg-dark: #080808; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #ffffff; overflow-x: hidden; margin: 0; }

        /* --- NUEVA ANIMACIÓN PREMIUM --- */
        #intro-bg {
            position: fixed; inset: 0; background-color: #000; z-index: 150;
            transition: opacity 0.8s ease-in-out;
        }

        #animated-logo {
            position: fixed; z-index: 200; white-space: nowrap;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3rem;
            animation: elegantFade 2.5s ease-in-out forwards;
        }
        @media (min-width: 768px) { #animated-logo { font-size: 5rem; } }

        @keyframes elegantFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); filter: blur(10px); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0px); }
            70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); filter: blur(10px); }
        }
        
        /* --- PANTALLA HERO --- */
        #hero {
            position: fixed; inset: 0; z-index: 100;
            background: radial-gradient(circle at center, #1a1a1a 0%, #080808 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 1s ease;
        }
        .glow-hero { position: absolute; width: 60vw; height: 60vw; max-width: 500px; max-height: 500px; background: var(--brand-red); filter: blur(150px); opacity: 0.15; }

        /* --- UI COMPONENTS (RESTO DEL CÓDIGO SIN CAMBIOS) --- */
        .glass-nav { background: rgba(8, 8, 8, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); opacity: 0; transition: opacity 0.8s ease; }
        .category-btn { position: relative; font-weight: 600; font-size: 0.8rem; color: #888; transition: all 0.3s; padding: 0.5rem 1rem; }
        .category-btn.active { color: #fff; }
        .category-btn.active::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 2px; background: var(--brand-red); }
        .product-card { background: #111; border-radius: 16px; overflow: hidden; transition: all 0.4s ease; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .product-card:hover { transform: translateY(-5px); border-color: rgba(224, 30, 55, 0.4); }
        .discount-tag { background: linear-gradient(45deg, #ff0000, #E01E37); padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; }
        .reveal-up { animation: revealUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; opacity: 0; }
        @keyframes revealUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes imagePop { 0% { opacity: 0; transform: scale(0.9) translateY(15px); filter: blur(5px); } 100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); } }
        .anim-pop { animation: imagePop 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
