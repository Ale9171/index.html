<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAL_STORE💋 | Premium Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand-red: #E01E37; --bg-dark: #080808; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #fff; margin: 0; }

        /* Animación Logo */
        #animated-logo { position: fixed; z-index: 300; transition: all 1s cubic-bezier(0.87, 0, 0.13, 1); font-weight: 900; }
        .pos-center { top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; }
        .pos-nav { top: 18px; left: 24px; font-size: 1.25rem; }

        /* Animación Zoom al visualizar */
        .zoom-in { animation: zoomIn 0.4s ease-out forwards; }
        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .glass-nav { background: rgba(8, 8, 8, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="animated-logo" class="pos-center text-white tracking-tighter">VAL_STORE<span class="text-[#E01E37]">💋</span></div>
    <div id="intro-bg" class="fixed inset-0 bg-black z-20 transition-opacity duration-1000"></div>

    <section id="hero" class="fixed inset-0 z-10 flex flex-col items-center justify-center opacity-0 transition-opacity duration-1000">
        <button onclick="startExperience()" class="bg-white text-black px-10 py-3 rounded-full font-black text-xs uppercase tracking-widest hover:bg-[#E01E37] hover:text-white transition-all transform hover:scale-105">Explorar Catálogo</button>
    </section>

    <nav id="main-nav" class="glass-nav fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center opacity-0 transition-opacity duration-1000">
        <div class="w-24"></div>
        <div class="hidden md:flex gap-6">
            <button onclick="filterItems('Mujer')" class="text-xs font-bold text-gray-400 hover:text-white">MUJER</button>
            <button onclick="filterItems('Hombre')" class="text-xs font-bold text-gray-400 hover:text-white">HOMBRE</button>
            <button onclick="filterItems('Niñ@s')" class="text-xs font-bold text-gray-400 hover:text-white">NIÑ@S</button>
        </div>
        <div class="flex gap-4 text-xl">
            <a href="https://instagram.com/tu_usuario" class="hover:text-[#E01E37]"><i class="fab fa-instagram"></i></a>
            <a href="https://facebook.com/tu_pagina" class="hover:text-[#E01E37]"><i class="fab fa-facebook"></i></a>
            <a href="https://wa.me/50240283552" class="hover:text-[#E01E37]"><i class="fab fa-whatsapp"></i></a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-24">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6" id="galeria"></div>
    </main>

    <div id="modal" class="fixed inset-0 z-[300] hidden bg-black/95 flex items-center justify-center p-4">
        <button onclick="cerrar()" class="absolute top-6 left-6 z-[310] text-white bg-white/10 px-4 py-2 rounded-full text-xs font-bold uppercase backdrop-blur-md hover:bg-white hover:text-black">✕ Salir</button>
        <div id="modal-content" class="bg-[#111] w-full max-w-4xl h-[80vh] flex flex-col md:flex-row rounded-3xl overflow-hidden shadow-2xl zoom-in">
            <img id="m-img" src="" class="w-full md:w-1/2 h-64 md:h-full object-cover">
            <div class="p-8 flex flex-col justify-center">
                <h2 id="m-titulo" class="text-3xl font-black mb-4"></h2>
                <p id="m-precio" class="text-2xl font-light text-[#E01E37] mb-6"></p>
                <button onclick="comprarPorWA()" class="bg-[#E01E37] text-white py-4 rounded-xl font-bold uppercase tracking-wider hover:bg-red-700 transition">Preguntar por WhatsApp 💋</button>
            </div>
        </div>
    </div>

    <script>
        const prendas = [ /* Mismo arreglo que antes */ ];
        const bgMusic = document.getElementById('bg-music');

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('animated-logo').classList.replace('pos-center', 'pos-nav');
                document.getElementById('intro-bg').style.opacity = '0';
                document.getElementById('hero').style.opacity = '1';
                setTimeout(() => document.getElementById('intro-bg').style.display = 'none', 1000);
            }, 1200);
        });

        function startExperience() {
            document.getElementById('hero').style.display = 'none';
            document.getElementById('main-nav').style.opacity = '1';
            bgMusic.play();
            renderGaleria();
        }

        function abrirModal(index) {
            indexActual = index;
            actualizarModal();
            document.getElementById('modal').classList.replace('hidden', 'flex');
        }

        function cerrar() {
            document.getElementById('modal').classList.replace('flex', 'hidden');
            bgMusic.pause(); // Música se pausa al cerrar visualización
            bgMusic.currentTime = 0; // Reinicia para la próxima
        }

        function comprarPorWA() {
            const p = prendas[indexActual];
            const msg = `¡Hola VAL_STORE💋! Me encantó este artículo: ${p.titulo}. ¿Aún está disponible?`;
            window.location.href = `https://wa.me/50240283552?text=${encodeURIComponent(msg)}`;
        }
        
        // ... (resto de funciones como renderGaleria)
    </script>
</body>
</html>
