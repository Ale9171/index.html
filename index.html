<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAL_STORE💋 | Premium Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand-red: #E01E37; --bg-dark: #080808; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #ffffff; overflow-x: hidden; }

        /* Pantalla de Entrada (Landing) */
        #hero {
            position: fixed; inset: 0; z-index: 100;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
        }
        .hero-logo { font-size: 4rem; font-weight: 900; letter-spacing: -2px; animation: pulseLogo 2s infinite; }
        
        /* Animaciones */
        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); opacity: 1; text-shadow: 0 0 20px rgba(224, 30, 55, 0); }
            50% { transform: scale(1.05); opacity: 0.8; text-shadow: 0 0 30px rgba(224, 30, 55, 0.5); }
        }

        .reveal-up { animation: revealUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        @keyframes revealUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Interfaz de Usuario */
        .glass-nav {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .category-btn {
            position: relative; font-weight: 600; font-size: 0.8rem; color: #888;
            transition: all 0.3s; padding: 0.5rem 1rem;
        }
        .category-btn.active { color: #fff; }
        .category-btn.active::after {
            content: ''; position: absolute; bottom: 0; left: 25%; width: 50%;
            height: 2px; background: var(--brand-red);
        }

        .product-card {
            background: #111; border-radius: 20px; overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.03);
        }
        .product-card:hover { transform: scale(1.02); border-color: rgba(224, 30, 55, 0.3); }

        /* Modal Adidas Style */
        .modal-blur { backdrop-filter: blur(20px); background: rgba(0,0,0,0.9); }
        .glow-bg {
            position: absolute; width: 300px; height: 300px;
            background: var(--brand-red); filter: blur(120px);
            opacity: 0.15; z-index: -1; top: 20%;
        }

        #music-control {
            position: fixed; bottom: 25px; right: 25px; z-index: 90;
            background: rgba(255,255,255,0.1); width: 50px; height: 50px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }

        .discount-tag {
            background: linear-gradient(45deg, #ff0000, #E01E37);
            padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 800;
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop><source src="musica.mp3" type="audio/mpeg"></audio>
    <audio id="click-sound"><source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg"></audio>

    <section id="hero">
        <div class="hero-logo text-white mb-8">VAL_STORE<span class="text-[#E01E37]">💋</span></div>
        <button onclick="startExperience()" class="bg-white text-black px-12 py-4 rounded-full font-black text-sm uppercase tracking-widest hover:bg-[#E01E37] hover:text-white transition-all duration-500 transform hover:scale-110 shadow-2xl">
            Explorar Catálogo
        </button>
        <p class="text-gray-500 mt-6 text-[10px] uppercase tracking-[0.3em]">Premium Fashion Guatemala</p>
    </section>

    <nav class="glass-nav fixed top-0 w-full z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="font-black text-xl tracking-tighter">VAL_STORE💋</span>
            <div class="hidden md:flex gap-4">
                <button onclick="filterItems('Mujer')" class="category-btn active">Mujer</button>
                <button onclick="filterItems('Hombre')" class="category-btn">Hombre</button>
                <button onclick="filterItems('Niñ@s')" class="category-btn">Niñ@s</button>
                <button onclick="filterItems('Oferta')" class="category-btn text-red-500">20% Descuento</button>
            </div>
            <a href="https://wa.me/50240283552" class="text-[10px] font-bold border border-white/20 px-4 py-2 rounded-full hover:bg-white hover:text-black transition">WHATSAPP</a>
        </div>
    </nav>

    <div class="md:hidden flex justify-center gap-2 mt-20 px-4">
        <button onclick="filterItems('Mujer')" class="category-btn active">Mujer</button>
        <button onclick="filterItems('Hombre')" class="category-btn">Hombre</button>
        <button onclick="filterItems('Niñ@s')" class="category-btn">Niñ@s</button>
        <button onclick="filterItems('Oferta')" class="category-btn text-red-500">20% OFF</button>
    </div>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="galeria"></div>
    </main>

    <div id="modal" class="fixed inset-0 z-[100] hidden modal-blur flex items-center justify-center p-4">
        <div class="glow-bg"></div>
        <button onclick="cerrar()" class="absolute top-8 right-8 text-white/50 hover:text-white text-2xl font-light">✕</button>
        
        <div class="max-w-5xl w-full grid md:grid-cols-2 gap-8 items-center">
            <div class="relative group">
                <img id="m-img" src="" class="w-full h-[50vh] md:h-[70vh] object-contain rounded-3xl transition-transform duration-700">
                <button onclick="cambiarPrenda(-1)" class="absolute left-0 top-1/2 -translate-y-1/2 bg-white/5 hover:bg-white/20 p-4 rounded-full">‹</button>
                <button onclick="cambiarPrenda(1)" class="absolute right-0 top-1/2 -translate-y-1/2 bg-white/5 hover:bg-white/20 p-4 rounded-full">›</button>
            </div>
            <div class="flex flex-col gap-4 text-left">
                <span id="m-marca" class="text-xs font-bold tracking-[0.4em] text-[#E01E37] uppercase"></span>
                <h2 id="m-titulo" class="text-4xl md:text-6xl font-black leading-none"></h2>
                <div class="flex items-center gap-4">
                    <p id="m-precio" class="text-3xl font-light"></p>
                    <div id="tag-oferta" class="discount-tag hidden">-20% OFF</div>
                </div>
                <p id="m-talla" class="text-gray-400 font-mono tracking-widest uppercase"></p>
                <div class="h-[1px] bg-white/10 my-4"></div>
                <button onclick="comprarPorWA()" class="bg-white text-black py-6 rounded-full font-black uppercase tracking-widest hover:bg-[#E01E37] hover:text-white transition-all">
                    Añadir al Carrito (WhatsApp) 💋
                </button>
            </div>
        </div>
    </div>

    <div id="music-control" onclick="toggleMusic()">🎵</div>

    <script>
        const prendas = [
            { img: 'https://i.ibb.co/ZpSKqZgK/IMG-20260513-WA0009.jpg', titulo: 'Pantalón de cuero café', precio: 'Q50', talla: 'M', marca: 'OLD NAVY', cat: 'Mujer' },
            { img: 'https://i.ibb.co/zhWLBtY8/IMG-20260513-WA0010.jpg', talla: 'S', precio: 'Q50', titulo: 'Pantalón de cuero negro', marca: 'OLD NAVY', cat: 'Mujer' },
            { img: 'https://i.ibb.co/nsZf8BQw/IMG-20260513-WA0011.jpg', titulo: 'Pantalón de lona', precio: 'Q60', talla: 'S', marca: 'LEVI STRAUSS', cat: 'Mujer' },
            { img: 'https://i.ibb.co/35s9BhSJ/IMG-20260513-WA0013.jpg', titulo: 'Blusa corte bardot', precio: 'Q25', talla: 'S/M', marca: 'EXCLUSIVO', cat: 'Mujer', oferta: true },
            { img: 'https://i.ibb.co/n8nYrnLq/IMG-20260513-WA0014.jpg', titulo: 'Blusa con brillante', precio: 'VENDIDA', talla: 'S', marca: 'Marca', cat: 'Mujer' },
            { img: 'https://i.ibb.co/s9Hxf0wj/IMG-20260513-WA0015.jpg', titulo: 'Traje de baño negro', precio: 'Q25', talla: 'XS/S', marca: 'Marca', cat: 'Mujer' },
            { img: 'https://i.ibb.co/8n5ZzFgy/IMG-20260513-WA0016.jpg', titulo: 'Short de lona', precio: 'Q30', talla: 'S', marca: 'Marca', cat: 'Mujer' },
            { img: 'https://i.ibb.co/cXg2zcd9/IMG-20260513-WA0018.jpg', titulo: 'Hoddie negro corto', precio: 'VENDIDA', talla: 'S/M', marca: 'WILD FABLE', cat: 'Mujer' },
            { img: 'https://i.ibb.co/DqDmSSs/IMG-20260513-WA0019.jpg', titulo: 'Suéter casual', precio: 'VENDIDA', talla: 'S', marca: 'NEW DAY', cat: 'Mujer' },
            { img: 'https://i.ibb.co/Qvgn64G5/IMG-20260513-WA0020.jpg', titulo: 'Estilo old money', precio: 'VENDIDA', talla: 'S', marca: 'Marca', cat: 'Mujer' },
            { img: 'https://i.ibb.co/fY0zjq3f/IMG-20260513-WA0021.jpg', titulo: 'Estilo old money', precio: 'Q35', talla: 'S', marca: 'OLD NAVY', cat: 'Mujer' },
            { img: 'https://i.ibb.co/hxsM3Txd/IMG-20260513-WA0022.jpg', titulo: 'Blusa básica', precio: 'VENDIDA', talla: 'S/M', marca: 'FOREVER 21', cat: 'Mujer' },
            { img: 'https://i.ibb.co/DPLhVHWh/IMG-20260513-WA0023.jpg', titulo: 'Blusa con escote bardot', precio: 'VENDIDA', talla: 'S', marca: 'Marca', cat: 'Mujer' },
            { img: 'https://i.ibb.co/LwDqhTj/IMG-20260513-WA0024.jpg', titulo: 'Suéter corto', precio: 'Q35', talla: 'S/M', marca: 'HOLLISTER', cat: 'Mujer', oferta: true },
            { img: 'https://i.ibb.co/kgzyHBMy/IMG-20260513-WA0025.jpg', titulo: 'Blusa básica', precio: 'VENDIDA', talla: 'S/M', marca: 'Marca', cat: 'Mujer' },
            { img: 'https://i.ibb.co/j9vxMPND/IMG-20260513-WA0026.jpg', titulo: 'Suéter estilo Old money casual', precio: 'VENDIDA', talla: 'S', marca: 'SINCERELY JULES', cat: 'Mujer' },
            { img: 'https://i.ibb.co/GQMfthzg/IMG-20260513-WA0027.jpg', titulo: 'Blusa formal', precio: 'Q25', talla: 'S', marca: 'H&M', cat: 'Mujer' },
            { img: 'https://i.ibb.co/twSTfCt3/IMG-20260513-WA0028.jpg', titulo: 'Blusa corte bardot', precio: 'VENDIDA', talla: 'S', marca: 'Marca', cat: 'Mujer' },
            { img: 'https://i.ibb.co/yBhHQDry/IMG-20260513-WA0029.jpg', titulo: 'Camisa tipo polo Nueva', precio: 'Q40', talla: 'M/L', marca: 'CALLAWAY', cat: 'Hombre' },
            { img: 'https://i.ibb.co/xcLDYZ5/IMG-20260513-WA0030.jpg', titulo: 'Suéter para caballero', precio: 'Q35', talla: 'S/M', marca: 'OLD NAVY', cat: 'Hombre' },
            { img: 'https://i.ibb.co/ytntRSB/IMG-20260513-WA0031.jpg', titulo: 'Playera y suéter para caballero', precio: 'Q60', talla: 'S y M', marca: 'Tommy', cat: 'Hombre', oferta: true },
            { img: 'https://i.ibb.co/Mx3hBHn8/IMG-20260513-WA0032.jpg', titulo: 'Camisa', precio: 'VENDIDA', talla: 'M', marca: 'XIOS', cat: 'Hombre' },
            { img: 'https://i.ibb.co/d0gjxc9X/IMG-20260513-WA0033.jpg', titulo: 'Chumpa para nena', precio: 'Q60', talla: '7/8 Años', marca: 'Nena', cat: 'Niñ@s' },
            { img: 'https://i.ibb.co/MFPFfxd/IMG-20260513-WA0034.jpg', titulo: 'Chumpa Para Nena', precio: 'Q35', talla: '2T', marca: 'CAT & JACK', cat: 'Niñ@s' }
        ];

        let indexActual = 0;
        let currentFilter = 'Mujer';
        const bgMusic = document.getElementById('bg-music');
        const clickSfx = document.getElementById('click-sound');

        function startExperience() {
            document.getElementById('hero').style.transform = 'translateY(-100%)';
            bgMusic.play();
            renderGaleria();
        }

        function filterItems(category) {
            currentFilter = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(category)) btn.classList.add('active');
            });
            renderGaleria();
        }

        function renderGaleria() {
            const container = document.getElementById('galeria');
            container.innerHTML = '';
            
            let filtered = prendas.filter(p => {
                if(currentFilter === 'Oferta') return p.oferta === true;
                return p.cat === currentFilter;
            });

            filtered.forEach((p, i) => {
                const globalIndex = prendas.indexOf(p);
                container.innerHTML += `
                    <div class="product-card group reveal-up" style="animation-delay: ${i*0.1}s" onclick="abrirModal(${globalIndex})">
                        <div class="relative overflow-hidden aspect-[3/4]">
                            <img src="${p.img}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                            ${p.oferta ? '<div class="absolute top-4 left-4 discount-tag">OFERTA</div>' : ''}
                        </div>
                        <div class="p-6">
                            <p class="text-[8px] font-black tracking-[0.3em] text-[#E01E37] uppercase">${p.marca}</p>
                            <h3 class="text-sm font-bold truncate mt-1">${p.titulo}</h3>
                            <div class="flex justify-between items-center mt-4">
                                <span class="font-black text-lg">${p.precio}</span>
                                <span class="text-[10px] text-gray-500 font-mono">${p.talla}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function abrirModal(index) {
            indexActual = index;
            actualizarModal();
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
            document.body.style.overflow = 'hidden';
            clickSfx.play();
        }

        function actualizarModal() {
            const p = prendas[indexActual];
            document.getElementById('m-img').src = p.img;
            document.getElementById('m-titulo').innerText = p.titulo;
            document.getElementById('m-marca').innerText = p.marca;
            document.getElementById('m-precio').innerText = p.precio;
            document.getElementById('m-talla').innerText = "Size: " + p.talla;
            
            if(p.oferta) document.getElementById('tag-oferta').classList.remove('hidden');
            else document.getElementById('tag-oferta').classList.add('hidden');
        }

        function cambiarPrenda(dir) {
            indexActual = (indexActual + dir + prendas.length) % prendas.length;
            actualizarModal();
        }

        function cerrar() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function comprarPorWA() {
            const p = prendas[indexActual];
            const msg = `¡Hola Val_Store! 💋 Me interesa esta prenda:\n\n📌 Producto: ${p.titulo}\n💰 Precio: ${p.precio}\n📏 Talla: ${p.talla}\n🖼️ Imagen: ${p.img}\n\n¿Sigue disponible?`;
            window.location.href = `https://wa.me/50240283552?text=${encodeURIComponent(msg)}`;
        }

        function toggleMusic() {
            if (bgMusic.paused) { bgMusic.play(); } 
            else { bgMusic.pause(); }
        }

        // Swipe para móvil
        let touchstartX = 0;
        document.getElementById('modal').addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX);
        document.getElementById('modal').addEventListener('touchend', e => {
            if (touchstartX - e.changedTouches[0].screenX > 60) cambiarPrenda(1);
            if (e.changedTouches[0].screenX - touchstartX > 60) cambiarPrenda(-1);
        });
    </script>
</body>
</html>
