<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAL_STORE💋 | Nuevos Ingresos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f0f0f; color: #ffffff; }
        .product-card { background: #ffffff; border-radius: 12px; overflow: hidden; transition: transform 0.2s; cursor: pointer; color: #333; }
        .product-card:active { transform: scale(0.98); }
        .tag-nuevo { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.8); color: white; font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        #modal { display: none; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .talla-badge { background: #f3f4f6; color: #6b7280; font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid #e5e7eb; }
    </style>
</head>
<body>

    <!-- Header Estilo 40583.jpg -->
    <header class="bg-white text-black py-8 px-4 text-center">
        <h1 class="text-3xl font-bold tracking-tight">Nuevos Ingresos</h1>
        <p class="text-gray-500 text-sm mt-1">Marcas exclusivas • Piezas únicas</p>
    </header>

    <!-- Barra de Navegación -->
    <nav class="bg-white border-t border-gray-100 px-6 py-3 flex items-center justify-between sticky top-0 z-50">
        <span class="font-bold text-lg tracking-tighter text-black">VAL_STORE</span>
        <a href="https://wa.me/50259647654" class="bg-black text-white px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest">Pedir por WhatsApp</a>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8 grid grid-cols-2 md:grid-cols-3 gap-4">
        
        <!-- Ejemplo Producto 1 -->
        <div class="product-card relative" onclick="verProducto('https://i.ibb.co/3mkH7jb/IMG-20260512-211127.jpg', 'Polo Exclusiva', '$300', 'M', 'RALPH LAUREN')">
            <div class="tag-nuevo">Nuevo</div>
            <img src="https://i.ibb.co/3mkH7jb/IMG-20260512-211127.jpg" class="w-full aspect-[3/4] object-cover">
            <div class="p-3 bg-white">
                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">RALPH LAUREN</p>
                <h3 class="text-xs font-semibold text-gray-800 truncate">Polo Exclusiva</h3>
                <div class="flex items-center justify-between mt-2">
                    <p class="font-bold text-black text-sm">$300.00</p>
                    <span class="talla-badge">Talla M</span>
                </div>
            </div>
        </div>

        <!-- Ejemplo Producto 2 -->
        <div class="product-card relative" onclick="verProducto('https://i.ibb.co/nqYMpRG7/1778464851628.png', 'Chaqueta Trucker Denim', '$450', 'L', 'LEVI\'S')">
            <div class="tag-nuevo">Nuevo</div>
            <img src="https://i.ibb.co/nqYMpRG7/1778464851628.png" class="w-full aspect-[3/4] object-cover">
            <div class="p-3 bg-white">
                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">LEVI'S</p>
                <h3 class="text-xs font-semibold text-gray-800 truncate">Chaqueta Trucker Denim</h3>
                <div class="flex items-center justify-between mt-2">
                    <p class="font-bold text-black text-sm">$450.00</p>
                    <span class="talla-badge">Talla L</span>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="py-10 text-center border-t border-gray-800">
        <p class="text-[9px] text-gray-500 tracking-widest">© 2026 VAL_STORE • ENVIAMOS A TODA LA REPÚBLICA</p>
    </footer>

    <!-- MODAL DE ZOOM -->
    <div id="modal" class="fixed inset-0 z-[60] flex flex-col items-center justify-center p-4" onclick="cerrar()">
        <img id="m-img" class="max-w-full max-h-[60vh] rounded-xl mb-4 shadow-2xl">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm text-center shadow-2xl" onclick="event.stopPropagation()">
            <p id="m-marca" class="text-[10px] text-gray-400 font-bold uppercase mb-1"></p>
            <h2 id="m-titulo" class="text-xl font-bold text-black mb-1"></h2>
            <p id="m-talla" class="text-gray-500 text-sm mb-4"></p>
            <p id="m-precio" class="text-black font-bold text-2xl mb-6"></p>
            <button onclick="comprarPorWA()" class="bg-[#E01E37] text-white w-full py-4 rounded-2xl font-bold text-lg shadow-lg">Preguntar por WhatsApp 💋</button>
        </div>
    </div>

    <script>
        let itemNombre = "";
        let itemImagen = "";

        function verProducto(img, titulo, precio, talla, marca) {
            itemNombre = titulo;
            itemImagen = img; 
            document.getElementById('m-img').src = img;
            document.getElementById('m-marca').innerText = marca;
            document.getElementById('m-titulo').innerText = titulo;
            document.getElementById('m-talla').innerText = "Talla disponible: " + talla;
            document.getElementById('m-precio').innerText = precio;
            document.getElementById('modal').style.display = 'flex';
        }

        function cerrar() { document.getElementById('modal').style.display = 'none'; }

        function comprarPorWA() {
            const mensaje = "¡Hola! Me interesa esta prenda de Val_Store 💋\n\n" + 
                            "Producto: " + itemNombre + "\n" +
                            "Foto: " + itemImagen;
            window.location.href = "https://wa.me/50259647654?text=" + encodeURIComponent(mensaje);
        }
    </script>
</body>
</html>
