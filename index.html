<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAL_STORE💋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .hidden { display: none; }
        .card { background: #111; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="inicio" class="fixed inset-0 flex flex-col items-center justify-center z-50 bg-black">
        <h1 class="text-4xl font-black mb-8">VAL_STORE<span class="text-red-500">💋</span></h1>
        <button onclick="iniciar()" class="bg-white text-black px-8 py-3 rounded-full font-bold uppercase tracking-widest">Explorar Catálogo</button>
    </div>

    <nav id="nav" class="hidden p-4 flex justify-between items-center border-b border-gray-800">
        <h2 class="font-bold">VAL_STORE💋</h2>
        <div class="flex gap-4 text-xl">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="https://wa.me/50240283552" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
    </nav>

    <main id="catalogo" class="hidden p-4 grid grid-cols-2 gap-4">
        </main>

    <audio id="audio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('audio');

        // Lógica para detener música al salir del navegador/pestaña
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                audio.pause();
            } else {
                // Opcional: audio.play(); // Si quieres que suene al volver
            }
        });

        function iniciar() {
            document.getElementById('inicio').classList.add('hidden');
            document.getElementById('nav').classList.remove('hidden');
            document.getElementById('catalogo').classList.remove('hidden');
            
            // Iniciar música
            audio.play().catch(e => console.log("Esperando interacción..."));
            
            renderizar();
        }

        function renderizar() {
            const prendas = [
                { titulo: 'Blusa roja', precio: 'Q25', img: 'https://i.ibb.co/LwDqhTj/IMG-20260513-WA0024.jpg' },
                { titulo: 'Pantalón negro', precio: 'Q50', img: 'https://i.ibb.co/zhWLBtY8/IMG-20260513-WA0010.jpg' }
                // Agrega aquí todas tus prendas en formato {titulo, precio, img}
            ];

            const catalogo = document.getElementById('catalogo');
            catalogo.innerHTML = prendas.map(p => `
                <div class="card">
                    <img src="${p.img}" class="w-full h-40 object-cover rounded">
                    <p class="text-sm mt-2">${p.titulo}</p>
                    <p class="text-red-500 font-bold">${p.precio}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
