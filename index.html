<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAL_STORE💋 | Premium Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand-red: #E01E37; --bg-dark: #080808; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #ffffff; overflow-x: hidden; margin: 0; }

        /* --- NUEVA ANIMACIÓN INICIAL ULTRA CORREGIDA Y COMPATIBLE --- */
        #intro-bg {
            position: fixed; inset: 0; background-color: #000; z-index: 150;
            transition: opacity 0.6s ease-in-out;
        }

        #animated-logo { position: fixed; z-index: 200; white-space: nowrap; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; opacity: 0;
            animation: elegantFade 2.2s ease-in-out forwards;
        }
        @media (min-width: 768px) { #animated-logo { font-size: 5rem; } }

        @keyframes elegantFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.92); }
            25% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            75% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.05); }
        }

        /* --- PANTALLA HERO --- */
        #hero {
            position: fixed; inset: 0; z-index: 100;
            background: radial-gradient(circle at center, #1a1a1a 0%, #080808 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 1s ease;
        }
        /* Brillo de fondo */
        .glow-hero {
            position: absolute; width: 60vw; height: 60vw; max-width: 500px; max-height: 500px;
            background: var(--brand-red); filter: blur(150px); opacity: 0.15;
        }

        /* --- UI COMPONENTS --- */
        .glass-nav {
            background: rgba(8, 8, 8, 0.85); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            opacity: 0; transition: opacity 0.8s ease;
        }

        .category-btn {
            position: relative; font-weight: 600; font-size: 0.8rem; color: #888;
            transition: all 0.3s; padding: 0.5rem 1rem;
        }
        .category-btn.active { color: #fff; }
        .category-btn.active::after {
            content: ''; position: absolute; bottom: 0; left: 25%; width: 50%;
            height: 2px; background: var(--brand-red);
        }

        .product-card {
            background: #111; border-radius: 16px; overflow: hidden;
            transition: all 0.4s ease; border: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
        }
        .product-card:hover { transform: translateY(-5px); border-color: rgba(224, 30, 55, 0.4); }

        .discount-tag {
            background: linear-gradient(45deg, #ff0000, #E01E37);
            padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 800;
        }

        /* Animación de entrada de productos */
        .reveal-up { animation: revealUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; opacity: 0; }
        @keyframes revealUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Nueva animación visual para prendas en el modal */
        @keyframes imagePop {
            0% { opacity: 0; transform: scale(0.9) translateY(15px); filter: blur(5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }
        .anim-pop {
            animation: imagePop 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        /* Ocultar barra de scroll en el modal en móviles */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    
.hero-particles{
position:absolute;
inset:0;
background:
radial-gradient(circle at 20% 30%, rgba(224,30,55,.25), transparent 25%),
radial-gradient(circle at 80% 70%, rgba(224,30,55,.15), transparent 25%);
animation: floatBg 8s ease-in-out infinite alternate;
}

@keyframes floatBg{
from{transform:scale(1);}
to{transform:scale(1.15);}
}

@keyframes luxuryIntro{
0%{opacity:0;letter-spacing:20px;transform:translate(-50%,-50%) scale(.8);}
50%{opacity:1;letter-spacing:4px;}
100%{opacity:0;transform:translate(-50%,-50%) scale(1.2);}
}

#animated-logo{
animation: luxuryIntro 3s ease forwards !important;
}

#hero{
transition: transform 1.2s cubic-bezier(.22,1,.36,1), opacity 1s ease;
}

</style>
</head>
