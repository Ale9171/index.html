<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAL_STORE💋 | Premium Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand-red: #E01E37; --bg-dark: #080808; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #ffffff; overflow-x: hidden; margin: 0; }

        /* --- ANIMACIÓN INICIAL --- */
        #intro-bg {
            position: fixed; inset: 0; background-color: #000; z-index: 150;
            transition: opacity 1s ease;
        }

        #animated-logo {
            position: fixed; z-index: 200; white-space: nowrap;
            transition: all 1.2s cubic-bezier(0.87, 0, 0.13, 1);
        }
        
        /* Estado inicial (Centro) */
        .pos-center {
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3rem; 
        }
        @media (min-width: 768px) { .pos-center { font-size: 5rem; } }

        /* Estado final (Esquina superior izquierda) */
        .pos-nav {
            top: 18px; left: 24px; transform: translate(0, 0);
            font-size: 1.25rem; /* Tamaño de logo de la navbar */
        }

        /* --- PANTALLA HERO --- */
        #hero {
            position: fixed; inset: 0; z-index: 100;
            background: radial-gradient(circle at center, #1a1a1a 0%, #080808 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: all 1s ease;
        }
        /* Brillo de fondo */
        .glow-hero {
            position: absolute; width: 60vw; height: 60vw; max-width: 500px; max-height: 500px;
            background: var(--brand-red); filter: blur(150px); opacity: 0.15;
        }

        /* --- UI COMPONENTS --- */
        .glass-nav {
            background: rgba(8, 8, 8, 0.85); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            opacity: 0; transition: opacity 1s ease;
        }

        .category-btn {
            position: relative; font-weight: 600; font-size: 0.8rem; color: #888;
            transition: all 0.3s; padding: 0.5rem 1rem;
        }
        .category-btn.active { color: #fff; }
        .category-btn.active::after {
            content: ''; position: absolute; bottom: 0; left: 25%; width: 50%;
            height: 2px; background: var(--brand-red);
        }

        .product-card {
            background: #111; border-radius: 16px; overflow: hidden;
            transition: all 0.4s ease; border: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
        }
        .product-card:hover { transform: translateY(-5px); border-color: rgba(224, 30, 55, 0.4); }

        .discount-tag {
            background: linear-gradient(45deg, #ff0000, #E01E37);
            padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 800;
        }

        /* Animación de entrada de productos */
        .reveal-up { animation: revealUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; opacity: 0; }
        @keyframes revealUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Ocultar barra de scroll en el modal en móviles */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="animated-logo" class="font-black text-white tracking-tighter pos-center">
        VAL_STORE<span class="text-[#E01E37]">💋</span>
    </div>

    <div id="intro-bg"></div>

    <section id="hero">
        <div class="glow-hero"></div>
        <button onclick="startExperience()" class="relative z-10 bg-white text-black px-12 py-4 rounded-full font-black text-[13px] uppercase tracking-widest hover:bg-[#E01E37] hover:text-white transition-all duration-500 transform hover:scale-105 shadow-[0_0_30px_rgba(255,255,255,0.15)] mt-12">
            Explorar Catálogo
        </button>
    </section>

    <nav id="main-nav" class="glass-nav fixed top-0 w-full z-[90] px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="w-[120px] opacity-0 pointer-events-none">VAL_STORE💋</div>
            
            <div class="hidden md:flex gap-4">
                <button onclick="filterItems('Mujer')" class="category-btn active">Mujer</button>
                <button onclick="filterItems('Hombre')" class="category-btn">Hombre</button>
                <button onclick="filterItems('Niñ@s')" class="category-btn">Niñ@s</button>
                <button onclick="filterItems('Oferta')" class="category-btn text-red-500">20% Descuento</button>
            </div>
            
            <div id="music-control" onclick="toggleMusic()" class="cursor-pointer text-xl opacity-50 hover:opacity-100 transition">🎵</div>
        </div>
    </nav>

    <div class="md:hidden flex justify-center gap-1 mt-[80px] px-2" id="mobile-nav" style="opacity: 0; transition: opacity 1s ease;">
        <button onclick="filterItems('Mujer')" class="category-btn active">Mujer</button>
        <button onclick="filterItems('Hombre')" class="category-btn">Hombre</button>
        <button onclick="filterItems('Niñ@s')" class="category-btn">Niñ@s</button>
        <button onclick="filterItems('Oferta')" class="category-btn text-red-500">20% OFF</button>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-6 md:py-12 md:mt-[80px]">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6" id="galeria"></div>
    </main>

    <div id="modal" class="fixed inset-0 z-[250] hidden bg-black/95 backdrop-blur-xl flex-col md:flex-row items-center justify-center p-0 md:p-6 h-[100dvh]">
        
        <button onclick="cerrar()" class="absolute top-4 left-4 bg-white/10 border border-white/20 text-white px-5 py-2 rounded-full flex items-center gap-2 text-sm font-bold z-[260] hover:bg-white hover:text-black transition-colors backdrop-blur-md shadow-lg">
            ✕ Salir
        </button>

        <div class="w-full h-full md:max-w-5xl md:h-[80vh] md:bg-[#111] md:rounded-[2rem] md:border md:border-white/10 flex flex-col md:flex-row overflow-hidden relative">
            
            <div class="relative w-full h-[55%] md:h-full md:w-1/2 bg-black flex items-center justify-center">
                <img id="m-img" src="" class="w-full h-full object-contain">
                <button onclick="cambiarPrenda(-1)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/60 text-white w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-md text-xl border border-white/10 hover:bg-white/20 z-10">‹</button>
                <button onclick="cambiarPrenda(1)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/60 text-white w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-md text-xl border border-white/10 hover:bg-white/20 z-10">›</button>
            </div>
            
            <div class="w-full h-[45%] md:h-full md:w-1/2 flex flex-col p-6 bg-gradient-to-b from-[#111] to-[#080808]">
                <div class="overflow-y-auto no-scrollbar pb-4">
                    <span id="m-marca" class="text-[10px] font-black tracking-[0.4em] text-[#E01E37] uppercase"></span>
                    <h2 id="m-titulo" class="text-2xl md:text-4xl font-black leading-tight mt-1 mb-2 text-white"></h2>
                    <div class="flex items-center gap-4 mt-2">
                        <p id="m-precio" class="text-3xl font-light"></p>
                        <div id="tag-oferta" class="discount-tag hidden">-20% OFF</div>
                    </div>
                    <p id="m-talla" class="text-[#888] font-mono tracking-widest uppercase text-sm mt-4"></p>
                </div>
                
                <div class="mt-auto w-full pb-2">
                    <button onclick="comprarPorWA()" class="w-full bg-[#E01E37] text-white py-4 rounded-xl font-bold uppercase tracking-wider hover:bg-red-700 transition-all shadow-[0_0_20px_rgba(224,30,55,0.3)] active:scale-[0.98]">
                        Preguntar por WhatsApp 💋
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Tus datos intactos
        const prendas = [
            { img: 'https://i.ibb.co/ZpSKqZgK/IMG-20260513-WA0009.jpg', titulo: 'Pantalón de cuero café', precio: 'Q50', talla: 'M', marca: 'OLD NAVY', cat: 'Mujer' },
            { img: 'https://i.ibb.co/zhWLBtY8/IMG-20260513-WA0010.jpg', talla: 'S', precio: 'Q50', titulo: 'Pantalón de cuero negro', marca: 'OLD NAVY', cat: 'Mujer' },
            { img: 'https://i.ibb.co/nsZf8BQw/IMG-20260513-WA0011.jpg', titulo: 'Pantalón de lona', precio: 'Q60', talla: 'S', marca: 'LEVI STRAUSS', cat: 'Mujer' },
            { img: 'https://i.ibb.co/35s9BhSJ/IMG-20260513-WA0013.jpg', titulo: 'Blusa corte bardot', precio: 'Q25', talla: 'S/M', marca: 'EXCLUSIVO', cat: 'Mujer', oferta: true },
            { img: 'https://i.ibb.co/n8nYrnLq/IMG-20260513-WA0014.jpg', titulo: 'Blusa con brillante', precio: 'VENDIDA', talla: 'S', marca: 'Marca', cat: 'Mujer' },
            { img: 'https://i.ibb.co/s9Hxf0wj/IMG-20260513-WA0015.jpg', titulo: 'Traje de baño negro', precio: 'Q25', talla: 'XS/S', marca: 'Marca', cat: 'Mujer' },
            { img: 'https://i.ibb.co/8n5ZzFgy/IMG-20260513-WA0016.jpg', titulo: 'Short de lona', precio: 'Q30', talla: 'S', marca: 'Marca', cat: 'Mujer' },
            { img: 'https://i.ibb.co/cXg2zcd9/IMG-20260513-WA0018.jpg', titulo: 'Hoddie negro corto', precio: 'VENDIDA', talla: 'S/M', marca: 'WILD FABLE', cat: 'Mujer' },
            { img: 'https://i.ibb.co/DqDmSSs/IMG-20260513-WA0019.jpg', titulo: 'Suéter casual', precio: 'VENDIDA', talla: 'S', marca: 'NEW DAY', cat: 'Mujer' },
            { img: 'https://i.ibb.co/Qvgn64G5/IMG-20260513-WA0020.jpg', titulo: 'Estilo old money', precio: 'VENDIDA', talla: 'S', marca: 'Marca', cat: 'Mujer' },
            { img: 'https://i.ibb.co/fY0zjq3f/IMG-20260513-WA0021.jpg', titulo: 'Estilo old money', precio: 'Q35', talla: 'S', marca: 'OLD NAVY', cat: 'Mujer' },
            { img: 'https://i.ibb.co/hxsM3Txd/IMG-20260513-WA0022.jpg', titulo: 'Blusa básica', precio: 'VENDIDA', talla: 'S/M', marca: 'FOREVER 21', cat: 'Mujer' },
            { img: 'https://i.ibb.co/DPLhVHWh/IMG-20260513-WA0023.jpg', titulo: 'Blusa con escote bardot', precio: 'VENDIDA', talla: 'S', marca: 'Marca', cat: 'Mujer' },
            { img: 'https://i.ibb.co/LwDqhTj/IMG-20260513-WA0024.jpg', titulo: 'Suéter corto', precio: 'Q35', talla: 'S/M', marca: 'HOLLISTER', cat: 'Mujer', oferta: true },
            { img: 'https://i.ibb.co/kgzyHBMy/IMG-20260513-WA0025.jpg', titulo: 'Blusa básica', precio: 'VENDIDA', talla: 'S/M', marca: 'Marca', cat: 'Mujer' },
            { img: 'https://i.ibb.co/j9vxMPND/IMG-20260513-WA0026.jpg', titulo: 'Suéter estilo Old money casual', precio: 'VENDIDA', talla: 'S', marca: 'SINCERELY JULES', cat: 'Mujer' },
            { img: 'https://i.ibb.co/GQMfthzg/IMG-20260513-WA0027.jpg', titulo: 'Blusa formal', precio: 'Q25', talla: 'S', marca: 'H&M', cat: 'Mujer' },
            { img: 'https://i.ibb.co/twSTfCt3/IMG-20260513-WA0028.jpg', titulo: 'Blusa corte bardot', precio: 'VENDIDA', talla: 'S', marca: 'Marca', cat: 'Mujer' },
            { img: 'https://i.ibb.co/yBhHQDry/IMG-20260513-WA0029.jpg', titulo: 'Camisa tipo polo Nueva', precio: 'Q40', talla: 'M/L', marca: 'CALLAWAY', cat: 'Hombre' },
            { img: 'https://i.ibb.co/xcLDYZ5/IMG-20260513-WA0030.jpg', titulo: 'Suéter para caballero', precio: 'Q35', talla: 'S/M', marca: 'OLD NAVY', cat: 'Hombre' },
            { img: 'https://i.ibb.co/ytntRSB/IMG-20260513-WA0031.jpg', titulo: 'Playera y suéter para caballero', precio: 'Q60', talla: 'S y M', marca: 'Tommy', cat: 'Hombre', oferta: true },
            { img: 'https://i.ibb.co/Mx3hBHn8/IMG-20260513-WA0032.jpg', titulo: 'Camisa', precio: 'VENDIDA', talla: 'M', marca: 'XIOS', cat: 'Hombre' },
            { img: 'https://i.ibb.co/d0gjxc9X/IMG-20260513-WA0033.jpg', titulo: 'Chumpa para nena', precio: 'Q60', talla: '7/8 Años', marca: 'Nena', cat: 'Niñ@s' },
            { img: 'https://i.ibb.co/MFPFfxd/IMG-20260513-WA0034.jpg', titulo: 'Chumpa Para Nena', precio: 'Q35', talla: '2T', marca: 'CAT & JACK', cat: 'Niñ@s' }
        ];

        let indexActual = 0;
        let currentFilter = 'Mujer';
        const bgMusic = document.getElementById('bg-music');

        // LÓGICA DE ANIMACIÓN INICIAL
        window.addEventListener('load', () => {
            // Espera 1 segundo para que lean el logo en el centro
            setTimeout(() => {
                const logo = document.getElementById('animated-logo');
                logo.classList.remove('pos-center');
                logo.classList.add('pos-nav'); // Mueve el logo a la esquina
                
                document.getElementById('intro-bg').style.opacity = '0';
                document.getElementById('hero').style.opacity = '1';
                
                setTimeout(() => {
                    document.getElementById('intro-bg').style.display = 'none';
                }, 1000);
            }, 1200);
        });

        // INICIAR EXPERIENCIA (Al tocar el botón de explorar)
        function startExperience() {
            document.getElementById('hero').style.transform = 'translateY(-100%)';
            document.getElementById('hero').style.pointerEvents = 'none'; // Evitar que estorbe los clics
            
            document.getElementById('main-nav').style.opacity = '1';
            document.getElementById('mobile-nav').style.opacity = '1';
            
            bgMusic.play().catch(e => console.log("Permiso de audio bloqueado", e));
            renderGaleria();
        }

        function filterItems(category) {
            currentFilter = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(category)) btn.classList.add('active');
            });
            renderGaleria();
        }

        function renderGaleria() {
            const container = document.getElementById('galeria');
            container.innerHTML = '';
            
            let filtered = prendas.filter(p => {
                if(currentFilter === 'Oferta') return p.oferta === true;
                return p.cat === currentFilter;
            });

            filtered.forEach((p, i) => {
                const globalIndex = prendas.indexOf(p);
                container.innerHTML += `
                    <div class="product-card group reveal-up" style="animation-delay: ${i*0.08}s" onclick="abrirModal(${globalIndex})">
                        <div class="relative overflow-hidden aspect-[3/4]">
                            <img src="${p.img}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                            ${p.oferta ? '<div class="absolute top-2 left-2 discount-tag">OFERTA</div>' : ''}
                        </div>
                        <div class="p-4 md:p-6">
                            <p class="text-[8px] font-black tracking-[0.2em] md:tracking-[0.3em] text-[#E01E37] uppercase">${p.marca}</p>
                            <h3 class="text-xs md:text-sm font-bold truncate mt-1">${p.titulo}</h3>
                            <div class="flex justify-between items-center mt-2 md:mt-4">
                                <span class="font-black text-sm md:text-lg">${p.precio}</span>
                                <span class="text-[9px] md:text-[10px] text-gray-500 font-mono">${p.talla}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function abrirModal(index) {
            indexActual = index;
            actualizarModal();
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function actualizarModal() {
            const p = prendas[indexActual];
            document.getElementById('m-img').src = p.img;
            document.getElementById('m-titulo').innerText = p.titulo;
            document.getElementById('m-marca').innerText = p.marca;
            document.getElementById('m-precio').innerText = p.precio;
            document.getElementById('m-talla').innerText = "Talla: " + p.talla;
            
            if(p.oferta) document.getElementById('tag-oferta').classList.remove('hidden');
            else document.getElementById('tag-oferta').classList.add('hidden');
        }

        function cambiarPrenda(dir) {
            indexActual = (indexActual + dir + prendas.length) % prendas.length;
            actualizarModal();
        }

        function cerrar() {
            document.getElementById('modal').classList.remove('flex');
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function comprarPorWA() {
            const p = prendas[indexActual];
            const msg = `¡Hola Val_Store! 💋 Me interesa esta prenda:\n\n📌 Producto: ${p.titulo}\n💰 Precio: ${p.precio}\n📏 Talla: ${p.talla}\n\n¿Sigue disponible?`;
            window.location.href = `https://wa.me/50240283552?text=${encodeURIComponent(msg)}`;
        }

        function toggleMusic() {
            const icono = document.getElementById('music-control');
            if (bgMusic.paused) { 
                bgMusic.play(); 
                icono.style.opacity = '1';
            } else { 
                bgMusic.pause(); 
                icono.style.opacity = '0.5';
            }
        }

        // Deslizar con el dedo en el modal (Swipe)
        let touchstartX = 0;
        document.getElementById('modal').addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX);
        document.getElementById('modal').addEventListener('touchend', e => {
            let touchendX = e.changedTouches[0].screenX;
            if (touchstartX - touchendX > 50) cambiarPrenda(1); // Desliza izquierda
            if (touchendX - touchstartX > 50) cambiarPrenda(-1); // Desliza derecha
        });
    </script>
</body>
</html>
