<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAL_STORE💋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="pantalla-inicio" class="fixed inset-0 flex flex-col items-center justify-center z-50 bg-black">
        <h1 class="text-4xl font-black mb-6">VAL_STORE<span class="text-red-500">💋</span></h1>
        <button onclick="iniciarCatalogo()" class="bg-white text-black px-8 py-3 rounded-full font-bold uppercase text-sm tracking-widest">Explorar Catálogo</button>
    </div>

    <nav id="navegacion" class="hidden p-4 flex justify-between items-center bg-black border-b border-gray-800">
        <h2 class="font-bold">VAL_STORE💋</h2>
        <div class="flex gap-5 text-xl">
            <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://wa.me/50240283552?text=¡Hola!%20Me%20gustaría%20saber%20más%20sobre%20sus%20productos." target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
    </nav>

    <main id="catalogo" class="hidden p-4 grid grid-cols-2 gap-4">
        </main>

    <script>
        const prendas = [
            { img: 'https://i.ibb.co/ZpSKqZgK/IMG-20260513-WA0009.jpg', titulo: 'Pantalón café', precio: 'Q50' },
            { img: 'https://i.ibb.co/zhWLBtY8/IMG-20260513-WA0010.jpg', titulo: 'Pantalón negro', precio: 'Q50' }
        ];

        function iniciarCatalogo() {
            // Ocultar inicio, mostrar resto
            document.getElementById('pantalla-inicio').classList.add('hidden');
            document.getElementById('navegacion').classList.remove('hidden');
            document.getElementById('catalogo').classList.remove('hidden');
            
            // Cargar productos
            const container = document.getElementById('catalogo');
            container.innerHTML = prendas.map(p => `
                <div class="bg-[#111] p-2 rounded-lg">
                    <img src="${p.img}" class="w-full h-40 object-cover rounded">
                    <p class="text-xs mt-2">${p.titulo}</p>
                    <p class="text-red-500 font-bold">${p.precio}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
