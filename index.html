<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAL_STORE💋 | Premium Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand-red: #E01E37; --bg-dark: #080808; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #ffffff; overflow-x: hidden; margin: 0; }

        /* --- ANIMACIONES --- */
        #intro-bg { position: fixed; inset: 0; background-color: #000; z-index: 150; transition: opacity 1s ease; }
        #animated-logo { position: fixed; z-index: 200; white-space: nowrap; transition: all 1.2s cubic-bezier(0.87, 0, 0.13, 1); }
        .pos-center { top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; }
        .pos-nav { top: 18px; left: 24px; font-size: 1.25rem; }

        /* Zoom modal */
        .zoom-in-effect { animation: zoomIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #hero { position: fixed; inset: 0; z-index: 100; background: radial-gradient(circle at center, #1a1a1a 0%, #080808 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: all 1s ease; }
        .glass-nav { background: rgba(8, 8, 8, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); opacity: 0; transition: opacity 1s ease; }
        .category-btn { position: relative; font-weight: 600; font-size: 0.8rem; color: #888; transition: all 0.3s; padding: 0.5rem 1rem; }
        .category-btn.active { color: #fff; }
        .category-btn.active::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 2px; background: var(--brand-red); }
        .product-card { background: #111; border-radius: 16px; overflow: hidden; transition: all 0.4s ease; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .product-card:hover { transform: translateY(-5px); border-color: rgba(224, 30, 55, 0.4); }
        .discount-tag { background: linear-gradient(45deg, #ff0000, #E01E37); padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; }
        .reveal-up { animation: revealUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; opacity: 0; }
        @keyframes revealUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="animated-logo" class="font-black text-white tracking-tighter pos-center">VAL_STORE<span class="text-[#E01E37]">💋</span></div>
    <div id="intro-bg"></div>

    <section id="hero">
        <button onclick="startExperience()" class="relative z-10 bg-white text-black px-12 py-4 rounded-full font-black text-[13px] uppercase tracking-widest hover:bg-[#E01E37] hover:text-white transition-all transform hover:scale-105 shadow-[0_0_30px_rgba(255,255,255,0.15)]">Explorar Catálogo</button>
    </section>

    <nav id="main-nav" class="glass-nav fixed top-0 w-full z-[90] px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-black text-white text-[1.25rem]">VAL_STORE<span class="text-[#E01E37]">💋</span></div>
            <div class="hidden md:flex gap-4">
                <button onclick="filterItems('Mujer')" class="category-btn active">Mujer</button>
                <button onclick="filterItems('Hombre')" class="category-btn">Hombre</button>
                <button onclick="filterItems('Niñ@s')" class="category-btn">Niñ@s</button>
            </div>
            <div class="flex items-center gap-4 text-xl">
                <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="#" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://wa.me/50240283552?text=¡Hola!%20Val_Store%20💋,%20me%20gustaría%20saber%20más%20sobre%20sus%20productos." target="_blank"><i class="fab fa-whatsapp"></i></a>
                <div id="music-control" onclick="toggleMusic()" class="cursor-pointer opacity-50 hover:opacity-100 transition">🎵</div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-24">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6" id="galeria"></div>
    </main>

    <div id="modal" class="fixed inset-0 z-[250] hidden bg-black/95 backdrop-blur-xl items-center justify-center p-4">
        <button onclick="cerrar()" class="absolute top-6 left-6 bg-white/10 text-white px-5 py-2 rounded-full font-bold text-sm z-[260]">✕ Salir</button>
        <div id="modal-container" class="bg-[#111] w-full max-w-4xl h-[70vh] rounded-3xl overflow-hidden flex flex-col md:flex-row zoom-in-effect">
            <img id="m-img" src="" class="w-full md:w-1/2 h-64 md:h-full object-cover">
            <div class="p-8 flex flex-col justify-center">
                <h2 id="m-titulo" class="text-3xl font-black"></h2>
                <p id="m-precio" class="text-xl text-[#E01E37] mt-2 mb-6"></p>
                <button onclick="comprarPorWA()" class="w-full bg-[#E01E37] text-white py-4 rounded-xl font-bold uppercase tracking-wider hover:bg-red-700 transition">Preguntar por WhatsApp 💋</button>
            </div>
        </div>
    </div>

    <script>
        const prendas = [ /* Tu lista de prendas... */ ];
        const bgMusic = document.getElementById('bg-music');

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('animated-logo').classList.replace('pos-center', 'pos-nav');
                document.getElementById('intro-bg').style.opacity = '0';
                document.getElementById('hero').style.opacity = '1';
                setTimeout(() => document.getElementById('intro-bg').style.display = 'none', 1000);
            }, 1200);
        });

        document.addEventListener("visibilitychange", () => { if (document.hidden) bgMusic.pause(); });

        function startExperience() {
            document.getElementById('hero').style.display = 'none';
            document.getElementById('main-nav').style.opacity = '1';
            bgMusic.play().catch(e => console.log("Audio bloqueado"));
            renderGaleria();
        }

        function cerrar() {
            document.getElementById('modal').classList.replace('flex', 'hidden');
            bgMusic.pause();
            bgMusic.currentTime = 0;
        }

        function abrirModal(index) {
            indexActual = index;
            // Llenar datos y mostrar
            document.getElementById('modal').classList.replace('hidden', 'flex');
        }

        function comprarPorWA() {
            const p = prendas[indexActual];
            window.location.href = `https://wa.me/50240283552?text=¡Hola!%20Val_Store%20💋,%20me%20gustaría%20saber%20más%20sobre:%20${encodeURIComponent(p.titulo)}`;
        }

        function toggleMusic() {
            if (bgMusic.paused) bgMusic.play(); else bgMusic.pause();
        }
    </script>
</body>
</html>
