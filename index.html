<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAL_STORE💋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hanken Grotesk', sans-serif; background-color: #fbf9f9; color: #000; }
        .btn-whatsapp { background-color: #E01E37; color: white; }
        .product-card { transition: all 0.3s ease; border: 1px solid #eee; cursor: pointer; }
        #modal { display: none; background: rgba(0,0,0,0.95); }
    </style>
</head>
<body>
    <nav class="bg-white border-b border-gray-200 px-6 py-4 sticky top-0 z-50 flex items-center justify-between shadow-sm">
        <span class="font-bold text-2xl tracking-tighter">VAL_STORE💋</span>
        <a href="https://wa.me/50259647654" class="btn-whatsapp px-5 py-2 rounded-full text-xs font-bold uppercase shadow-md">WhatsApp</a>
    </nav>

    <header class="text-center py-10 bg-white">
        <h1 class="text-3xl font-bold mb-1">Catálogo Exclusivo</h1>
        <p class="text-gray-400 text-sm uppercase tracking-widest">Segunda Mano - Marcas de Lujo</p>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 grid grid-cols-2 md:grid-cols-3 gap-4" id="galeria">
        
        <!-- Prenda 1 -->
        <div class="product-card bg-white rounded-xl overflow-hidden shadow-sm" 
             onclick="verProducto('https://i.ibb.co/tMkn8dH/tMkn8dH5.jpg', 'Adidas blanca', '450Q', 'L')">
            <img src="https://i.ibb.co/tMkn8dH/tMkn8dH5.jpg" class="w-full aspect-[3/4] object-cover">
            <div class="p-3 text-center">
                <h3 class="text-sm font-semibold truncate">Sudadera Sport</h3>
                <p class="text-xs text-gray-500">Talla: M</p>
                <p class="font-bold text-[#E01E37] mt-1">$450</p>
            </div>
        </div>
          
          <!-- Prenda 1 -->
        <div class="product-card bg-white rounded-xl overflow-hidden shadow-sm" 
             onclick="verProducto('https://i.ibb.co/3mkH7jbX/IMG-20260512-211127.jpg', 'Adidas blanca', '450Q', 'L')">
            <img src="https://i.ibb.co/3mkH7jbX/IMG-20260512-211127.jpg" class="w-full aspect-[3/4] object-cover">
            <div class="p-3 text-center">
                <h3 class="text-sm font-semibold truncate">Sudadera Sport</h3>
                <p class="text-xs text-gray-500">Talla: M</p>
                <p class="font-bold text-[#E01E37] mt-1">$450</p>
            </div>
        </div>


        <!-- Puedes copiar el bloque de arriba para más prendas -->

    </main>

    <!-- VENTANA DE DETALLE (ZOOM) -->
    <div id="modal" class="fixed inset-0 z-[60] flex flex-col items-center justify-center p-4" onclick="cerrar()">
        <img id="m-img" class="max-w-full max-h-[50vh] rounded-lg mb-4 shadow-2xl">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm text-center" onclick="event.stopPropagation()">
            <h2 id="m-titulo" class="text-xl font-bold mb-1"></h2>
            <p id="m-talla" class="text-gray-500 text-sm mb-1"></p> <!-- Talla en el modal -->
            <p id="m-precio" class="text-[#E01E37] font-bold text-2xl mb-4"></p>
            <button onclick="comprarPorWA()" class="btn-whatsapp w-full py-3 rounded-2xl font-bold text-lg">Preguntar por WhatsApp 💋</button>
        </div>
    </div>

    <script>
        let itemNombre = "";
        let itemImagen = "";

        function verProducto(img, titulo, precio, talla) {
            itemNombre = titulo;
            itemImagen = img; // Guardamos el link de la imagen
            document.getElementById('m-img').src = img;
            document.getElementById('m-titulo').innerText = titulo;
            document.getElementById('m-talla').innerText = "Talla: " + talla;
            document.getElementById('m-precio').innerText = precio;
            document.getElementById('modal').style.display = 'flex';
        }

        function cerrar() { document.getElementById('modal').style.display = 'none'; }

        function comprarPorWA() {
            // El mensaje ahora incluye el nombre y el link de la foto
            const mensaje = "¡Hola! Me interesa esta prenda de Val_Store 💋\n\nProducto: " + itemNombre + "\nFoto: " + itemImagen;
            window.location.href = "https://wa.me/50259647654?text=" + encodeURIComponent(mensaje);
        }
    </script>
</body>
</html>
