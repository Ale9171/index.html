<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAL_STORE💋 | Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        
        /* Animación inicial */
        #animated-logo { position: fixed; z-index: 300; transition: all 1s ease; font-weight: 900; }
        .pos-center { top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; } /* Reducido */
        .pos-nav { top: 15px; left: 20px; font-size: 1.2rem; }
        
        /* Contenedor del catálogo */
        .galeria-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .card { background: #111; border-radius: 10px; overflow: hidden; }
        .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
    </style>
</head>
<body>

    <div id="animated-logo" class="pos-center text-white">VAL_STORE<span class="text-red-500">💋</span></div>
    
    <div id="intro-bg" class="fixed inset-0 bg-black z-20 flex flex-col items-center justify-center">
        <button id="btn-explorar" onclick="startExperience()" class="bg-white text-black px-8 py-3 rounded-full font-bold uppercase text-sm tracking-widest hover:bg-red-500 hover:text-white transition">Explorar Catálogo</button>
    </div>

    <nav id="main-nav" class="fixed top-0 w-full z-40 p-4 flex justify-between items-center opacity-0 transition-opacity duration-1000">
        <div class="w-10"></div> <div class="flex gap-4 text-xl">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="https://wa.me/50240283552?text=¡Hola!%20Vi%20su%20catálogo%20y%20me%20gustaría%20saber%20más." target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
    </nav>

    <main id="catalogo" class="pt-20 hidden">
        <div id="galeria" class="galeria-grid">
            </div>
    </main>

    <script>
        // Array de prendas (asegúrate de tener tus datos aquí)
        const prendas = [
            { img: 'https://i.ibb.co/ZpSKqZgK/IMG-20260513-WA0009.jpg', titulo: 'Pantalón café', precio: 'Q50' },
            { img: 'https://i.ibb.co/zhWLBtY8/IMG-20260513-WA0010.jpg', titulo: 'Pantalón negro', precio: 'Q50' }
            // Agrega aquí el resto de tus imágenes...
        ];

        function startExperience() {
            // Ocultar pantalla inicial
            document.getElementById('intro-bg').style.display = 'none';
            document.getElementById('animated-logo').classList.replace('pos-center', 'pos-nav');
            
            // Mostrar elementos
            document.getElementById('main-nav').style.opacity = '1';
            document.getElementById('catalogo').classList.remove('hidden');
            
            renderGaleria();
        }

        function renderGaleria() {
            const container = document.getElementById('galeria');
            container.innerHTML = '';
            prendas.forEach(p => {
                container.innerHTML += `
                    <div class="card">
                        <img src="${p.img}" alt="${p.titulo}">
                        <div class="p-3">
                            <p class="text-sm font-bold">${p.titulo}</p>
                            <p class="text-red-500">${p.precio}</p>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
