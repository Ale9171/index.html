<!DOCTYPE html>
<html lang="es">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f0f0f; color: #ffffff; overflow-x: hidden; }
        .product-card { background: #ffffff; border-radius: 12px; overflow: hidden; cursor: pointer; color: #333; transition: transform 0.2s, box-shadow 0.2s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .product-card:active { transform: scale(0.95); }
        .tag-nuevo { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.8); color: white; font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        
        #modal { display: none; background: #000; transition: all 0.3s ease; }
        .modal-content { background: white; border-radius: 30px 30px 0 0; width: 100%; position: absolute; bottom: 0; padding: 25px 20px; text-align: center; color: black; animation: slideUpModal 0.4s ease-out; }
        .img-container { height: 65vh; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; top: -2vh; }
        #m-img { max-height: 90%; max-width: 95%; object-fit: contain; border-radius: 15px; animation: fadeInImg 0.4s ease-in; }
        
        .nav-btn { position: absolute; top: 40%; transform: translateY(-50%); background: rgba(255,255,255,0.1); color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 24px; z-index: 70; display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
        .nav-btn:active { background: rgba(255,255,255,0.3); }
        .talla-badge { background: #f3f4f6; color: #6b7280; font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid #e5e7eb; }
        
        #music-control { position: fixed; bottom: 20px; right: 20px; z-index: 100; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; font-size: 18px; transition: transform 0.2s; }
        #music-control:active { transform: scale(0.9); }

        /* --- NUEVAS ANIMACIONES --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-card {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0; /* Inicia oculto para que la animación lo revele */
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .anim-float { animation: float 3s ease-in-out infinite; }
        
        @keyframes slideUpModal {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        @keyframes fadeInImg {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
