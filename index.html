<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAL_STORE💋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hanken Grotesk', sans-serif; background-color: #fbf9f9; color: #000; }
        .btn-whatsapp { background-color: #E01E37; color: white; }
        .product-card { transition: all 0.3s ease; border: 1px solid #eee; cursor: pointer; }
        #modal { display: none; background: rgba(0,0,0,0.95); }
    </style>
</head>
<body>
    <nav class="bg-white border-b border-gray-200 px-6 py-4 sticky top-0 z-50 flex items-center justify-between shadow-sm">
        <span class="font-bold text-2xl tracking-tighter">VAL_STORE💋</span>
        <a href="https://wa.me/50257328935" class="btn-whatsapp px-5 py-2 rounded-full text-xs font-bold uppercase shadow-md">WhatsApp</a>
    </nav>

    <header class="text-center py-10 bg-white">
        <h1 class="text-3xl font-bold mb-1">Catálogo Exclusivo</h1>
        <p class="text-gray-400 text-sm uppercase tracking-widest">Segunda Mano - Marcas de Lujo</p>
    </header>

    <!-- ESTE ES EL LUGAR QUE BUSCÁBAMOS -->
    <main class="max-w-5xl mx-auto px-4 py-8 grid grid-cols-2 md:grid-cols-3 gap-4" id="galeria">
        
        <!-- Prenda 1 -->
        <div class="product-card bg-white rounded-xl overflow-hidden shadow-sm" onclick="verProducto('https://i.ibb.co/LzqMpxY/WhZbTGX.jpg', 'Playera Deportiva', '$250', 'M', 'Nueva')">
            <img src="https://i.ibb.co/LzqMpxY/WhZbTGX.jpg" class="w-full aspect-[3/4] object-cover">
            <div class="p-3">
                <p class="text-[10px] text-gray-400 font-bold uppercase">VAL_STORE</p>
                <h3 class="text-sm font-semibold truncate">Playera Deportiva</h3>
                <p class="font-bold text-black mt-1">$250</p>
            </div>
        </div>

        <!-- Prenda 2 -->
        <div class="product-card bg-white rounded-xl overflow-hidden shadow-sm" onclick="verProducto('https://i.ibb.co/3mkH7jb/3mkH7jbX.jpg', 'Polo Casual', '$300', 'L', 'Excelente')">
            <img src="https://i.ibb.co/3mkH7jb/3mkH7jbX.jpg" class="w-full aspect-[3/4] object-cover">
            <div class="p-3">
                <p class="text-[10px] text-gray-400 font-bold uppercase">VAL_STORE</p>
                <h3 class="text-sm font-semibold truncate">Polo Casual</h3>
                <p class="font-bold text-black mt-1">$300</p>
            </div>
        </div>

        <!-- Prenda 3 -->
        <div class="product-card bg-white rounded-xl overflow-hidden shadow-sm" onclick="verProducto('https://i.ibb.co/tMkn8dH/tMkn8dH5.jpg', 'Sudadera Sport', '$450', 'S', 'Nueva')">
            <img src="https://i.ibb.co/tMkn8dH/tMkn8dH5.jpg" class="w-full aspect-[3/4] object-cover">
            <div class="p-3">
                <p class="text-[10px] text-gray-400 font-bold uppercase">VAL_STORE</p>
                <h3 class="text-sm font-semibold truncate">Sudadera Sport</h3>
                <p class="font-bold text-black mt-1">$450</p>
            </div>
        </div>

        <!-- Nueva prenda -->
        <div class="product-card bg-white rounded-xl overflow-hidden shadow-sm" 
             onclick="verProducto('https://i.ibb.co/fgfhcqW/IMG-20260512-211116.jpg', 'Nombre de Prenda', '$Precio', 'Talla', 'Estado')">
            <img src="https://i.ibb.co/fgfhcqW/IMG-20260512-211116.jpg" class="w-full aspect-[3/4] object-cover">
            <div class="p-3">
                <p class="text-[10px] text-gray-400 font-bold uppercase">VAL_STORE</p>
                <h3 class="text-sm font-semibold truncate">Adidas</h3>
                <p class="font-bold text-black mt-1">$Precio</p>
            </div>
        </div>

    </main>

    <!-- VENTANA DE DETALLE (ZOOM) -->
    <div id="modal" class="fixed inset-0 z-[60] flex flex-col items-center justify-center p-4" onclick="cerrar()">
        <img id="m-img" class="max-w-full max-h-[60vh] rounded-lg mb-6 shadow-2xl">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm text-center" onclick="event.stopPropagation()">
            <h2 id="m-titulo" class="text-2xl font-bold mb-1"></h2>
            <p id="m-precio" class="text-[#E01E37] font-bold text-3xl mb-4"></p>
            <button onclick="comprarPorWA()" class="btn-whatsapp w-full py-4 rounded-2xl font-bold text-lg">Preguntar por WhatsApp 💋</button>
        </div>
    </div>

    <script>
        let itemActual = "";
        function verProducto(img, titulo, precio, talla, estado) {
            itemActual = titulo;
            document.getElementById('m-img').src = img;
            document.getElementById('m-titulo').innerText = titulo;
            document.getElementById('m-precio').innerText = precio;
            document.getElementById('modal').style.display = 'flex';
        }
        function cerrar() { document.getElementById('modal').style.display = 'none'; }
        function comprarPorWA() {
            window.location.href = "https://wa.me/TU_NUMERO?text=" + encodeURIComponent("Hola! Me interesa esta prenda de Val_Store: " + itemActual);
        }
    </script>
</body>
</html>
